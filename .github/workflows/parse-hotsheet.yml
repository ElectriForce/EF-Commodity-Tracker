name: Parse Hot Sheet

on:
  push:
    paths:
      - 'inbox/*.pdf'

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Process all PDFs in inbox
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          shopt -s nullglob
          PDFS=(inbox/*.pdf)
          if [ ${#PDFS[@]} -eq 0 ]; then
            echo "No PDFs found in inbox/"
            exit 0
          fi
          for PDF in "${PDFS[@]}"; do
            echo "Processing: $PDF"
            PDF_PATH="$PDF" python scripts/parse_hotsheet.py
          done

      - name: Commit results
        run: |
          git config user.name "EF Commodity Tracker"
          git config user.email "action@github.com"
          git add data/prices.json
          git add inbox/
          git commit -m "Price import $(date +%Y-%m-%d)" || echo "Nothing to commit"
          git push
